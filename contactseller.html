<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTHM Re-Trade - Contact Seller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <h2>UTHM Re-Trade</h2>
        </div>

        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="browse.html">Browse</a>
            <a href="most-wanted.html">Most Wanted</a>
            <a href="aboutus.html">About Us</a>
        </nav>
    </header>

    <main>
        <h2 class="section-title">Message the Seller</h2>
        <p class="page-description">Fill out this form to get in touch with the student seller. Remember to arrange your meeting safely on campus!</p>

        <div class="form-box">
            <form action="browse.html">
                <label>Item You Want to Buy:</label>
                <input type="text" placeholder="Enter Item">

                <label>Your Full Name:</label>
                <input type="text" placeholder="Enter your name">

                <label>Your UTHM Matric Number:</label>
                <input type="text" placeholder="e.g., AI250000">

                <label>Your Message to Seller:</label>
                <textarea rows="5" placeholder="Hi! Is this item still available? Can we meet at the library tomorrow?"></textarea>

                <button type="submit">Send Message 🚀</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 UTHM Re-Trade Project</p>
    </footer>

</body>
</html>
